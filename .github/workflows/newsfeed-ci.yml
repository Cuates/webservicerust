name: Newsfeed CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'newsfeed/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/newsfeed-ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'newsfeed/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/newsfeed-ci.yml'

env:
  CARGO_TERM_COLOR: always
  # Skip database checks in sqlx since we don't have a live DB in CI yet
  SQLX_OFFLINE: true

jobs:
  check:
    name: Check, Lint, and Test (${{ matrix.database_target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        database_target: [postgres, mariadb, mssql]

    env:
      DATABASE_TARGET: ${{ matrix.database_target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Newsfeed Environment
        uses: ./.github/actions/newsfeed-setup
        
      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Cargo Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Tests & Enforce Coverage
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 35 --fail-under-functions 35 --fail-under-regions 40
