name: Newsfeed Release

on:
  push:
    tags:
      - 'newsfeed-v*'

jobs:
  build-and-archive:
    name: Build and Archive
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            archive_ext: .tar.gz
          - os: macos-latest
            archive_ext: .tar.gz
          - os: windows-latest
            archive_ext: .zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "newsfeed-release"

      - name: Build newsfeed-server
        run: cargo build --release -p newsfeed-server

      - name: Prepare Assets (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release_assets
          cp target/release/newsfeed-server release_assets/
          cp .env.example release_assets/
          cp README.md release_assets/
          cp LICENSE release_assets/
          cd release_assets
          tar -czvf ../newsfeed-server-${{ github.ref_name }}-${{ matrix.os }}${{ matrix.archive_ext }} *

      - name: Prepare Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          New-Item -ItemType Directory -Force -Path release_assets
          Copy-Item target/release/newsfeed-server.exe -Destination release_assets/
          Copy-Item .env.example -Destination release_assets/
          Copy-Item README.md -Destination release_assets/
          Copy-Item LICENSE -Destination release_assets/
          Compress-Archive -Path release_assets\* -DestinationPath newsfeed-server-${{ github.ref_name }}-${{ matrix.os }}${{ matrix.archive_ext }} -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsfeed-server-${{ matrix.os }}
          path: newsfeed-server-${{ github.ref_name }}-${{ matrix.os }}${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build-and-archive
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: newsfeed-server-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true
