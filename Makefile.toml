[config]
skip_core_tasks = true
default_to_workspace = false

[env]
CARGO_MAKE_WORKSPACE_SKIP_MEMBERS = true

[tasks.help]
workspace = false
description = "List all available tasks."
command = "cargo"
args = ["make", "--list-all-steps"]

[tasks.build]
workspace = false
description = "Build release binary (--locked)"
command = "cargo"
args = ["build", "--release", "--locked"]

[tasks.build-dev]
workspace = false
description = "Build debug binary"
command = "cargo"
args = ["build"]

[tasks.check]
workspace = false
description = "Run cargo check all crates"
command = "cargo"
args = ["check", "--workspace"]

[tasks.check-deadcode]
workspace = false
description = "Run cargo clippy to deny dead code across all crates"
command = "cargo"
args = ["clippy", "--workspace", "--", "-D", "dead_code"]

[tasks.clean]
workspace = false
description = "Run cargo clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.fix]
workspace = false
description = "Format code and automatically fix clippy warnings"
script_runner = "@duckscript"
script = '''
exec cargo fmt --all
exec cargo clippy --workspace --fix --allow-dirty --allow-staged -- -D warnings
'''

[tasks.info]
workspace = false
description = "Print formatted environment and project information"
script_runner = "@duckscript"
script = '''
out = exec rustc --version
rustc_version = trim ${out.stdout}

out = exec cargo --version
cargo_version = trim ${out.stdout}

out = exec rustup show active-toolchain
toolchain = trim ${out.stdout}

echo " "
echo "[✔] Environment"
echo "    - OS: ${CARGO_MAKE_RUST_TARGET_OS} ${CARGO_MAKE_RUST_TARGET_ENV} (${CARGO_MAKE_RUST_TARGET_ARCH})"
echo "    ✔ rustc: ${rustc_version}"
echo "    ✔ cargo: ${cargo_version}"
echo "    ✔ Rust toolchain: ${toolchain}"
echo " "
echo "[-] Workspace Packages"
exec cargo tree --depth 0 --workspace
echo " "
'''

[tasks.audit]
workspace = false
description = "Run cargo audit for vulnerabilities"
command = "cargo"
args = ["audit", "--ignore", "RUSTSEC-2023-0071", "--ignore", "RUSTSEC-2026-0097"]

[tasks.check-docker]
workspace = false
description = "Verify Docker Desktop is running before executing tests that require containers."
script_runner = "@duckscript"
script = '''
out = exec docker ps
is_empty = is_empty ${out.stdout}
if ${is_empty}
    echo "Error: Docker Desktop is not running. Please start it to run integration tests."
    exit 1
else
    echo "[✔] Docker Desktop is running."
end
'''

[tasks.test]
workspace = false
description = "Run all workspace tests"
dependencies = ["check-docker"]
command = "cargo"
args = ["test", "--workspace"]

[tasks.test-coverage]
workspace = false
description = "Run tests, print coverage summary, and generate lcov.info"
run_task = { name = ["check-docker", "test-coverage-run", "test-coverage-report"] }

[tasks.test-coverage-run]
command = "cargo"
args = ["llvm-cov", "--workspace", "--all-features", "--ignore-filename-regex", ".*main\\.rs", "--fail-under-lines", "99", "--fail-under-functions", "99"]

[tasks.test-coverage-report]
command = "cargo"
args = ["llvm-cov", "report", "--lcov", "--ignore-filename-regex", ".*main\\.rs", "--output-path", "lcov.info"]

[tasks.docker-build]
workspace = false
description = "Build Docker image"
command = "docker"
args = ["compose", "build"]

[tasks.docker-up]
workspace = false
description = "Start containers (detached)"
command = "docker"
args = ["compose", "up", "-d"]

[tasks.docker-down]
workspace = false
description = "Stop containers"
command = "docker"
args = ["compose", "down"]

[tasks.clean-test-containers]
workspace = false
description = "Safely force-remove ONLY orphaned testcontainers (ignores personal containers)"
script_runner = "@duckscript"
script = '''
out = exec docker ps -a -q --filter "label=org.testcontainers=true"
is_empty = is_empty ${out.stdout}
if ${is_empty}
    echo "No orphaned testcontainers found. Your personal containers are untouched."
else
    echo "Found orphaned testcontainers. Removing..."
    exec docker rm -f ${out.stdout}
    echo "Cleaned up orphaned testcontainers."
end
'''

[tasks.docker-restart]
workspace = false
description = "Restart containers"
script_runner = "@duckscript"
script = '''
exec docker compose down
exec docker compose up -d
'''

[tasks.docker-logs]
workspace = false
description = "Follow container logs"
command = "docker"
args = ["compose", "logs", "-f", "newsfeed-server"]

[tasks.key-gen]
workspace = false
description = "Generate a new API key"
script_runner = "@duckscript"
script = '''
exec bash scripts/generate-api-key.sh
'''

[tasks.key-revoke]
workspace = false
description = "Revoke an existing API key"
script_runner = "@duckscript"
script = '''
exec bash scripts/revoke-api-key.sh
'''

[tasks.use-postgres]
workspace = false
description = "Switch active database backend to PostgreSQL"
script_runner = "@rust"
script = '''
fn main() {
    let content = std::fs::read_to_string(".env").unwrap();
    let mut new_content = String::new();
    for line in content.lines() {
        if line.starts_with("DATABASE_TARGET=") {
            new_content.push_str("DATABASE_TARGET=postgres\n");
        } else {
            new_content.push_str(line);
            new_content.push('\n');
        }
    }
    std::fs::write(".env", new_content).unwrap();
    println!("Switched active database target to: postgres");
}
'''

